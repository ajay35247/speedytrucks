<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>APTrucking - India's #1 Freight Marketplace</title>
    <meta name="description" content="Post loads, find trucks, track shipments live. India's leading freight marketplace." />
    <meta name="theme-color" content="#1660F5" />
    <link rel="canonical" href="https://www.aptrucking.in/" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="APTrucking - India's Freight Marketplace" />
    <meta property="og:url" content="https://www.aptrucking.in/" />
    <meta property="og:type" content="website" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{background:#050D1F;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
      #root{min-height:100vh}
      #loader{position:fixed;inset:0;background:#050D1F;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
      #loader.hide{opacity:0;pointer-events:none}
      .lt{font-size:64px;animation:bounce 1s infinite}
      .ln{color:#fff;font-size:26px;font-weight:700;margin:14px 0 4px}
      .ls{color:#888;font-size:14px;margin-bottom:28px}
      .lb{width:200px;height:4px;background:#1a3060;border-radius:2px;overflow:hidden}
      .lf{height:100%;background:#1660F5;border-radius:2px;animation:ld 1.4s ease-in-out infinite}
      @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes ld{0%{width:0}50%{width:70%}100%{width:100%}}
    </style>
  </head>
  <body>
    <div id="loader" aria-hidden="true">
      <div class="lt">🚛</div>
      <div class="ln">APTrucking</div>
      <div class="ls">India's #1 Freight Marketplace</div>
      <div class="lb"><div class="lf"></div></div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideLoader=function(){var l=document.getElementById('loader');if(l){l.classList.add('hide');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},400);}};
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
